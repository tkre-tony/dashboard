  <h1 class="ed-art-headline">Sasseur REIT 1Q 2026: Portfolio Sales Hit Record RMB1,390.4M (+11.4%), EMA Rental +5.7% RMB / +5.1% S$, Cost Of Debt Cut To 3.9% — But 1.6-Year WALE And A Kunming Soft Spot Name The Tenant-Mix Reset Beneath A Record Quarter</h1>
  <p class="ed-art-standfirst">Sasseur REIT released its 1Q FY2026 business and operational update on 14 May 2026 for the quarter ended 31 March 2026. Portfolio outlet sales hit an all-time high of RMB1,390.4 million, up 11.4% YoY (+RMB142.7m) — the highest first quarter since listing, driven by Chinese New Year campaigns across all four outlets. EMA rental income rose 5.7% in RMB terms to RMB185.5m and 5.1% in SGD terms to S$34.2m, with the variable component up 11.5% tracking the sales beat and the fixed component up the contractual 3.0%. Portfolio occupancy held at 98.5%, VIP membership crossed the 5 million mark, and weighted average cost of debt fell 50bps to 3.9% on proactive refinancing, with aggregate leverage a sector-low 25.4%. But beneath the record headline, the 1.6-year WALE and Kunming's +5.3% sales name a deliberate tenant-mix reset rather than a problem. Three signals beyond the headline.</p>

  <div class="ed-art-body"><p class="lede"><strong>Sasseur REIT (SGX: CRPU)</strong> released its 1Q FY2026 business and operational update on 14 May 2026 for the quarter ended 31 March 2026. Portfolio outlet sales hit an all-time high of RMB1,390.4 million, up 11.4% YoY (+RMB142.7m) — the highest first quarter since listing. EMA rental income rose 5.7% in RMB to RMB185.5m and 5.1% in SGD to S$34.2m. Portfolio occupancy held at 98.5%, VIP membership crossed 5 million, and weighted average cost of debt fell 50bps to 3.9%. Aggregate leverage a sector-low 25.4%. Three signals beyond the headline.</p>

<h2>Financial Headlines</h2>
<p>Portfolio outlet sales of RMB1,390.4m (+11.4% YoY, +RMB142.7m) marked the highest first quarter since the 2018 listing, driven by Chinese New Year promotional campaigns across all four outlets. EMA rental income — the figure Sasseur's Entrusted Management Agreement model pays to the REIT — rose 5.7% in RMB to RMB185.5m, comprising the fixed component up the contractual 3.0% to RMB122.3m and the variable component up 11.5% to RMB63.2m, the latter pegged directly to outlet sales. In SGD terms EMA rental income rose 5.1% to S$34.2m, the slightly slower pace reflecting a 0.6% YoY depreciation of RMB against SGD (average rate S$1 : RMB5.4206 for 1Q 2026 vs 5.3891 for 1Q 2025). Portfolio valuation held at RMB8.4 billion.</p>

<h2>Portfolio Sales — Record, But Uneven</h2>
<p>All four outlets grew, but the spread tells the operational story. Chongqing Liangjiang, the flagship at 39% of portfolio valuation, grew 11.1% to RMB732.2m and set a record first quarter. Chongqing Bishan grew fastest at +16.4% to RMB124.0m. Hefei grew 14.5% to RMB325.4m, also a record first quarter. Kunming lagged at +5.3% to RMB208.8m — "decent growth amid ongoing tenant repositioning." Three of four outlets delivered double-digit growth; Kunming is mid-reset, with the former cinema space being re-purposed for new F&amp;B offerings, targeted for completion ahead of the Anniversary Sales campaign.</p>

<h2>Occupancy And Lease Structure</h2>
<p>Portfolio occupancy held at 98.5% (vs 98.8% at FY2025 close). Chongqing Liangjiang maintained 100.0%; Bishan 99.3%; Kunming 98.7%; Hefei dipped to 97.2% on ongoing asset-enhancement works. WALE is deliberately short — 1.6 years by NLA, 0.8 years by gross revenue — a structural feature, not a weakness: short leases let the manager replace non-performing tenants quickly and adapt to fast-changing Chinese consumer preferences. 59.2% of NLA (66.4% of gross revenue) expires in 2026, with renewal efforts underway. VIP membership crossed 5 million (5,049K, +4.0% QoQ), contributing more than 60% of 1Q outlet sales — a four-year CAGR of 17.1%.</p>

<h2>Capital Management</h2>
<p>The capital structure is the cleanest in the S-REIT space. Aggregate leverage of 25.4% (vs 25.1% at 31 December 2025) is among the lowest of any SGX-listed REIT, leaving S$862.5m of debt headroom to the MAS 50% limit. Weighted average cost of debt fell 50bps to 3.9% (from 4.4%) after the manager proactively refinanced onshore bank loans ahead of maturity, extending tenor from 2028 to 2031. Average debt maturity lengthened to 5.1 years (from 4.2). Interest coverage 5.0x (from 4.7x). Critically, 100% of borrowings are now RMB-denominated — a natural hedge that matches the RMB-earning asset base and insulates both income and balance sheet from SGD/RMB translation noise. Gross borrowings S$444.1m.</p>

<h2>Three Signals Beyond The Headline</h2>
<p><strong>1. THE EMA MODEL IS DOING EXACTLY WHAT IT IS DESIGNED TO DO.</strong> Sasseur's variable rental component (+11.5%) tracked the +11.4% sales beat almost one-for-one, while the fixed component delivered its contractual +3.0% floor. This is the entrusted-management structure working as intended: the REIT captures upside when outlets outperform, but a fixed floor (with 3% annual escalation) protects downside. The variable component is pegged at 4.0%-5.5% of each outlet's sales.</p>
<p><strong>2. THE BALANCE SHEET IS THE REAL STORY.</strong> A 25.4% leverage ratio and 3.9% cost of debt, fully RMB-denominated, is a rare combination. With S$862.5m of headroom and management explicitly flagging "accretive acquisition" as a 2026 focus, Sasseur has the cheapest and most flexible balance sheet to act on the China consumption-recovery thesis. The 100% RMB debt is the quiet structural advantage — most overseas-asset S-REITs carry FX mismatch; Sasseur has eliminated it.</p>
<p><strong>3. KUNMING IS THE TELL ON FORWARD STRATEGY.</strong> Kunming's +5.3% (versus +11-16% elsewhere) is not weakness — it is the cost of an active reset. The former cinema is being re-purposed to F&amp;B; +39space was relocated to a prime ground-floor luxury concept; vacated Block B space was backfilled with stronger domestic brands. This is the playbook short leases exist to enable. Watch Kunming's 2H FY2026 sales — if the reset converts, it validates the deliberate-short-WALE thesis. China's macro helps: GDP +5.0% in 1Q 2026, retail sales +2.4%, and the 15th Five-Year Plan prioritising household consumption.</p></div>
