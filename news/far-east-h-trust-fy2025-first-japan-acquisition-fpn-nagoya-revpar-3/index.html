<p class="ed-art-standfirst">Far East Hospitality Trust FY2025 Annual Report (year ended 31 December 2025) marks a pivotal year of geographic expansion — completing its first overseas acquisition in Japan — while Singapore hotel RevPAR softened 3.</p>
<div class="ed-art-byline"><span class="ed-art-byline-by">By PropertyAtlas</span><span class="ed-art-byline-sep">&middot;</span><span>5 April 2026</span><span class="ed-art-byline-sep">&middot;</span><span>3 min read</span></div>

<div class="ed-art-body"><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Far East Hospitality Trust FY2025 Annual Report (year ended 31 December 2025) marks a pivotal year of geographic expansion — completing its first overseas acquisition in Japan — while Singapore hotel RevPAR softened 3.8% amid a more competitive environment. DPS declined 8.4% to 3.70 S¢ on higher property-related costs, though core distribution from taxable income grew 2.2% YoY.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">FIRST OVERSEAS ACQUISITION — JAPAN</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">On 25 April 2025, Far East H-Trust completed the acquisition of Four Points by Sheraton Nagoya, Chubu International Airport (319 keys, freehold) for ¥6,000M (S$52.8M) — a 23% discount to independent valuation of ¥7,790M. Managed by Marriott International; 6-min walk from Chubu Centrair Airport; near Aichi Sky Expo. Far East H-BT was activated as master lessee. Post-acquisition (May-Dec comparable): RevPAR +6.0% YoY, GOP +12.4% YoY, occ +5.7pp. Partial-year gross revenue contribution: S$6.9M.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">FINANCIAL HIGHLIGHTS</div><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Gross Revenue: S$111.4M (FY2024: S$108.7M; +2.5% — higher Commercial Premises income + FPN contribution).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>NPI: S$96.6M (FY2024: S$99.3M; -2.8% — higher property-related expenses).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Distribution to Stapled Securityholders: S$75.3M (FY2024: S$81.4M; -7.5%).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>DPS: 3.70 S¢ (FY2024: 4.04 S¢; -8.4%; incl. 0.39 S¢ capital distribution from Central Square divestment gains).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Core DPS (taxable income): +2.2% YoY.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Total Assets: S$2,611.3M (FY2024: S$2,586.5M). Aggregate Leverage: 33.0% (FY2024: 30.8%).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>WACD: 3.1% (FY2024: 4.1%; -100bps — significant debt cost improvement). ICR: 3.6x (FY2024: 3.0x).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Total Borrowings: S$774.8M (S$741.6M unsecured + S$33.2M secured/TMK bonds). Wtd avg debt maturity: 3.6yr.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>S$499.3M (~64%) sustainability-linked term loans. 53.5% fixed rate borrowings.</li></ul><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">SINGAPORE HOTEL PERFORMANCE (9 HOTELS, 3,094 KEYS)</p><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Portfolio RevPAR: S$139 (-3.8% YoY) | ADR: S$170 (-4.1%) | Occupancy: 81.3% (+0.3pp).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Leisure segment: 73.1% of room revenue (FY2024: 75.6%); Corporate improved to 26.9%.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Top source markets: North Asia 28.4% (Chinese + Japanese), Southeast Asia 26.3%, Europe 18.1%.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Orchard Rendezvous Hotel (388 keys): Highest revenue at S$19.1M but largest value decline to S$390.4M (-2.8%).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Village Hotel Changi: Revenue +6.5% to S$8.2M; BCA Green Mark GoldPlus achieved post chiller replacement AEI.</li></ul><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">SINGAPORE SERVICED RESIDENCE PERFORMANCE (3 SRs, 240 UNITS)</p><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Portfolio RevPAU: S$220 (-3.4% YoY) | ADR: S$270 (stable) | Occupancy: 81.5% (-2.7pp).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Corporate segment: 53.7% of SR revenue (FY2024: 68.0%); Leisure: 46.3% — guest mix shift.</li></ul><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">COMMERCIAL PREMISES (180 UNITS IN 8 PROPERTIES)</p><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Revenue: S$18.3M (+5.6% YoY) — 16.4% of total gross revenue.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Office occupancy: 99.2% (+4.5pp); rental rates +2.6%; Regency House 100% occupied.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Retail: stable occupancy at Rendezvous Hotel, Village Hotel Albert Court, Orchard Rendezvous Hotel, Changi, Robertson Quay.</li></ul><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">PORTFOLIO VALUATION</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Total portfolio: S$2.56B | Singapore: S$2.49B | Japan FPN: ¥7,790M. Top assets by value: Orchard Rendezvous Hotel S$390.4M, Oasia Hotel Novena S$349.0M, Rendezvous Hotel S$281.6M, Oasia Downtown S$278.0M.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">CEO REMUNERATION</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Gerald Lee Hwee Keong: S$960,642 FY2025 (FY2024: S$931,546; +3.1%). Mix: 60% salary+CPF / 16% variable bonus / 24% LTI (Restricted Unit Plan, vests over 3 years). No director fees as executive director. Top-5 KMP (excl CEO) aggregate: S$1,657,182. Director fees total: S$549,584 (80% cash / 20% in Stapled Securities).</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY TAKEAWAY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Far East H-Trust's FY2025 headline DPS dip (-8.4%) masks a more nuanced picture: core taxable income distribution grew +2.2%, the WACD fell 100bps to 3.1%, and the Trust successfully completed its first overseas acquisition at a 23% discount to valuation. Singapore hotels faced a softer RevPAR environment (-3.8%) absent the major events that boosted 2024, but Commercial Premises delivered +5.6% revenue growth and the Japan asset is performing in line. The Trust is FTSE EPRA Nareit Global and iEdge Next 50 constituent, and SGTI ranked 6th for the 7th consecutive year.</p></div>
