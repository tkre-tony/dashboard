<div class="ed-art-byline"><span class="ed-art-byline-by">By PropertyAtlas</span><span class="ed-art-byline-sep">&middot;</span><span>27 April 2026</span><span class="ed-art-byline-sep">&middot;</span><span>9 min read</span></div>

<div class="ed-art-body"><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">CapitaLand Ascendas REIT 1Q 2026 (three-month period ended 31 March 2026) is the most transactional update CLAR has filed in recent reporting history. S$1.6 billion of acquisitions — five separate deals across Singapore, US, Spain, and Japan — landed in 1Q-2Q 2026, anchored by a debut S$1.3 billion Tier III hyperscale data centre in Greater Osaka (49% interest, completing 2Q). A S$903.5 million Equity Fund Raise was announced in April 2026, with proceeds earmarked to repay debt facilities and bring aggregate leverage from a pre-EFR 42.0% (up from 38.9% twelve months ago) back to a pro forma 37.3%. Underneath the deal flow, the operating story is more nuanced: same-store portfolio occupancy dropped on a year-over-year same-store basis across all four major geographies, rental reversion of +10.6% in 1Q is guided to moderate to mid-single digit for full-year 2026, and the headline 90.5% portfolio occupancy is being held up by acquisitions delivering 100% occupancy that mask quiet softness in the underlying base.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">FINANCIAL HEADLINES</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Total Investment Properties S$18.6 billion (vs S$16.9 billion at 31 March 2025 — +S$1.7 billion / +10.1% in twelve months). Property count 229 (vs 226 prior, plus 4 currently under development). Tenant base 1,737 (vs ~1,780 prior, -2.4%). Portfolio occupancy 90.5% (vs 91.5% prior, -100bps). Singapore occupancy 90.6% (vs 91.6% prior, -100bps; same-store 90.4% vs 91.7%, -130bps same-store). US occupancy 85.7% (vs 88.0% prior, -230bps; same-store 84.4% vs 89.3%, -490bps same-store excluding new investments). Australia occupancy 93.0% (vs 89.2% prior, +380bps reported, helped by 95 Gilmore Road divestment). UK/Europe occupancy 93.1% (vs 98.9% prior, -580bps reported; same-store 91.8% vs 98.8%, -700bps same-store; Hawleys Lane decommissioning slated 2H 2026 — excluding it, occupancy would be 91.1%). Rental reversion in 1Q 2026 was +10.6% (vs +11.0% in 1Q 2025; vs +19.6% in 4Q 2025). FY 2026 reversion guidance is mid single-digit. Aggregate leverage 42.0% as at 31 March 2026 (vs 38.9% at 31 March 2025; vs 39.0% at 31 December 2025), expected to improve to ~37.3% in April 2026 immediately post the announced S$903.5 million EFR (assuming proceeds fully used to repay debt and before the announced Japan DC and 25 Loyang Crescent acquisitions). Weighted Average All-in Debt Cost 3.5% (vs 3.6% prior, -10bps). Interest Coverage Ratio 3.5x (vs 3.6x prior). Weighted Average Tenure of Debt 2.6 years (vs 3.1 years prior, -0.5 year). Fixed Rate Debt 70.0% (vs 73.6% prior, -360bps). Net Debt / Annualised EBITDA 9.1x (vs 8.1x prior, +1.0x). Unencumbered Properties 100% (vs 93.1% prior). Available debt headroom to MAS 50% leverage cap c.S$3.2 billion. Moody's A3. Total acquisitions 1Q-2Q 2026: S$1,649.8 million purchase consideration. Initial NPI yields 4.3% to 7.4%. Total ongoing project pipeline (development + AEI): S$730.3 million.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">THREE MOVES BEYOND THE HEADLINE</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">1. THE S$1.6B ACQUISITION WAVE + S$903.5M EFR IS THE LARGEST INVESTMENT PROGRAMME CLAR HAS EXECUTED IN A SINGLE QUARTER IN RECENT HISTORY — AND THE SEQUENCE IS DEBT-FIRST, EQUITY-LATER:</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The quarter's defining number is not the operating metrics — it is the deal flow. Five acquisitions completed or announced in 1Q-2Q 2026 totalling S$1,649.8 million in purchase consideration: DHL Canal Winchester logistics in Columbus US at S$94.5M (29 January, 7.4% initial NPI yield), the Spain logistics portfolio of six Grade A properties in Madrid and Barcelona at S$185.4M (27 February, 6.3% initial NPI yield, 9.1-year WALE on triple-net leases), Ascent at 2 Science Park Drive Singapore at 50% interest for S$245.0M (23 March, 5.6% NPI yield, the other 50% held by a global sovereign wealth fund), the Japan Greater Osaka hyperscale data centre at 49% interest for S$620.7M (announced, completing 2Q 2026, 4.3% NPI yield), and 25 Loyang Crescent in Singapore for S$504.2M (announced, completing 3Q 2026, 6.9% NPI yield, 13.4-year WALE on a sale-and-leaseback with Toll). For comparison, 1Q 2025 booked just S$153.4M of completed acquisitions (the single DHL Indianapolis property) — the year-over-year acceleration in deal velocity is roughly tenfold. The financing sequence matters. CLAR funded the early closures with debt, driving aggregate leverage from 39.0% at 31 December 2025 to 42.0% at 31 March 2026 — a 300bps increase in three months. The S$903.5M Equity Fund Raise announced in April 2026 brings gearing back to a pro forma 37.3%, assuming full debt repayment and before the Japan DC and 25 Loyang Crescent closings. The implication is that CLAR has roughly S$3.2 billion of additional debt headroom (to the 50% MAS cap) post-EFR — meaningful firepower for the announced acquisitions and any further opportunistic deals through FY 2026. Net Debt / Annualised EBITDA increased from 8.1x to 9.1x — a stretching metric that the EFR partially addresses (the deleveraging effect on leverage ratio is direct; on Net Debt / EBITDA the relief flows through more slowly as the new properties' EBITDA contributions stabilise). Weighted average debt tenure shortened from 3.1 years to 2.6 years — refinancing pressure has crept up at the same time as the deal book has expanded. Fixed-rate debt mix dropped from 73.6% to 70.0% — at the bottom of the manager's stated 70-80% range. The capital structure has more moving parts than it has had in recent quarters.</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">2. THE JAPAN DEBUT IS THE STRATEGIC ANCHOR — TIER III HYPERSCALE DATA CENTRE, 49% STAKE, S$1.3B TOTAL ASSET VALUE, 14.2-YEAR WALE WITH A SINGLE HYPERSCALER TENANT:</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The single largest acquisition in the 1Q-2Q 2026 wave is also the geographic and structural debut. The Japan data centre in Greater Osaka — the manager describes it as a "freehold Tier III hyperscale data centre completed in 2023 with IT capacity of 40.5MW (with potential expansion capacity of 5.4MW)" — is the first Japan asset in CLAR's portfolio and the largest single hyperscale data centre exposure CLAR has taken. Purchase consideration for the 49% interest is S$620.7 million (JPY 76.4 billion at illustrative JPY100 = S$0.8120), a 2.5% discount to the 100%-basis valuation of S$1,299 million. The other 51% is held by a fund managed by a subsidiary of Mitsui & Co — joint-venture sponsor selection is itself a signal about the deal's structuring quality. Initial NPI yield of 4.3% (4.2% post-transaction costs) is the lowest of the five 1Q-2Q acquisitions, reflecting the quality and scarcity of Tier III hyperscale assets in established Japanese markets. The lease structure is the operational anchor: 14.2-year WALE on a single "global investment grade data centre hyperscaler" tenant, 100% occupancy, built-in 1.0% annual rent escalation. The geographic diversification logic compounds: post-acquisition, CLAR's portfolio is anchored across five developed geographies (Singapore 67%, Australia 12%, US 11%, UK/Europe 10%, plus the new Japan exposure of approximately 7% on a pro forma basis once the deal closes). Data centre asset class exposure rises from 11% of portfolio (pre-deal) to a higher proportion post-close, with the Japanese hyperscale stack joining existing data centre presence in Singapore (6%) and UK/Europe (5%). The strategic read is that CLAR is making a clear segment bet — data centre exposure is being scaled deliberately as a structural growth driver, in line with the deck's framing of "steering our portfolio towards segments that cater to changing market and tenant requirements arising from structural trends... such as digitalisation and e-commerce." The execution risk is concentrated tenant exposure: a single hyperscaler tenant on a 14-year WALE is high quality but high concentration on a single contract, and the asset's value compounds or compresses materially with that tenant's renewal decision in 2040. The Mitsui co-investment provides a genuine local partner as a partial offset.</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">3. SAME-STORE FUNDAMENTALS ARE SOFTENING UNDERNEATH THE HEADLINE — ACQUISITION-LED OCCUPANCY INFLATION IS MASKING QUIET BASE WEAKNESS:</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The surface metrics tell one story: portfolio occupancy 90.5%, rental reversion +10.6%, no markets registering meaningful distress. The same-store-versus-reported gap tells another. Singapore same-store occupancy fell from 91.7% (1Q 2025) to 90.4% (1Q 2026) — a 130bps same-store decline that headline reads at -100bps because acquisitions completed in the prior twelve months (5 Science Park Drive, 9 Tai Seng Drive, 5 Toh Guan Road East post-redevelopment, 9 Kallang Sector, Tuas Connection, 2 Pioneer Sector 1 — six new investments) printed at 93.0% combined occupancy, lifting the headline. US same-store occupancy fell from 89.3% to 84.4% — a 490bps same-store decline. The reported figure shows a smaller -230bps deterioration because DHL Canal Winchester (acquired January 2026) and DHL Indianapolis (acquired January 2025) both contributed at 100% occupancy. UK/Europe same-store occupancy dropped from 98.8% to 91.8% — a 700bps same-store collapse, with the reported -580bps held up by the Spain logistics portfolio acquisition at 100% occupancy. Australia is the lone bright spot: same-store basis 93.0% (vs 89.2%) is genuinely stronger, helped by lease-up at Sydney and Brisbane assets that had vacancy in 1Q 2025. Rental reversion of +10.6% in 1Q 2026 reads strong against +11.0% a year ago, but the trajectory matters more: 4Q 2025 printed +19.6%, 1Q 2026 prints +10.6%, FY 2026 guidance is mid single-digit. The decelerating arc is explicit. Singapore same-store reversion 1Q 2026: Business Space & Life Sciences +12.8% (vs 4Q 2025 +26.7%), Logistics +12.2% (vs +11.2%), Industrial & Data Centres +7.4% (vs +9.9%). The base is softer; the rental power on lease renewals is moderating. The deck does not flag this as a concern — and the manager is correct that the base remains healthy by absolute standards — but unitholders should distinguish between (a) acquisition-led portfolio composition lifting the reported aggregates and (b) underlying same-store performance, which is decelerating.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">GREEN-CERT STEP-CHANGE AND ESG POSITIONING</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">A structural data point worth elevating: CLAR's green-certified properties (by GFA) jumped from 48% at 31 March 2025 to 75% at 31 March 2026 — a 27 percentage point step-change in twelve months, the largest single-year green-certification increase in CLAR's reporting history. The trajectory shows 78 properties green-certified at FY 2023, 84 at FY 2024, 161 YTD FY 2026 — nearly a doubling of the certified property count in approximately twenty-four months. Green financing scaled from S$2.6 billion (37% of total borrowings at 1Q 2025) to S$3.3 billion (40% at 1Q 2026). Annual solar generation capacity grew from 25 GWh (FY 2024) to a projected 33 GWh (FY 2026), with five additional Singapore properties installed with solar panels in 2026 reaching 35 properties total — described in the deck as one of the largest combined rooftop solar installations among S-REITs. Green lease coverage by Net Lettable Area increased from 57% at 1Q 2025 to 61% at 1Q 2026. The 2030 target trajectory remains on track: 100% green-certification of existing properties by 2030, 45% of electricity consumption from renewable sources by 2030. For institutional investors with ESG mandates, the certification arc is a tangible delivery against published targets — and it pairs structurally with the green-financing mix, providing access to the rate-discount advantages of certified-asset borrowing.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY TAKEAWAY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">CapitaLand Ascendas REIT 1Q 2026 is a transactional quarter: S$1.6 billion of acquisitions, S$903.5 million Equity Fund Raise, debut Japan exposure at a S$1.3 billion Tier III hyperscale data centre, geography expanded to five developed markets, S$3.2 billion of debt headroom post-EFR. The pre-EFR 42.0% gearing reads stretched but is by design — buy first, fund second — and the pro forma 37.3% is in line with peer-REIT discipline. Three patterns require honest reading. First, the deal velocity is roughly ten times the prior-year baseline; the question is whether the operating performance of the new assets stabilises at or above the entry yields (4.3% to 7.4%) over the next four to eight quarters. Second, the Japan debut is the largest single bet in the wave and is structurally sound (Tier III, 14-year WALE, hyperscaler counterparty, Mitsui co-investment) but concentrated on a single tenant contract — the Mitsui co-investment provides partial mitigation. Third — and the most important read for the next two quarters — same-store occupancy and same-store reversion are softening across the underlying base while acquisitions inflate the headline; FY 2026 reversion guidance has been explicitly stepped down from the 1Q +10.6% print to a mid single-digit annual figure. The Manager's investment programme is delivering composition change at scale; the operating engine inside the existing book needs watching.</p></div>
