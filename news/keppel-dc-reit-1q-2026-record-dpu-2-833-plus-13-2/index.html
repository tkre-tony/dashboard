<p class="ed-art-standfirst">Keppel DC REIT 1Q 2026 (quarter ended 31 Mar 2026) delivered DPU of 2.833 Singapore cents (+13.</p>
<div class="ed-art-byline"><span class="ed-art-byline-by">By PropertyAtlas</span><span class="ed-art-byline-sep">&middot;</span><span>17 April 2026</span><span class="ed-art-byline-sep">&middot;</span><span>4 min read</span></div>

<div class="ed-art-body"><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Keppel DC REIT 1Q 2026 (quarter ended 31 Mar 2026) delivered DPU of 2.833 Singapore cents (+13.2% YoY from 1Q 2025's 2.503¢) on distributable income of S$74.6M (+20.7% YoY) and net property income of S$105.2M (+19.4% YoY). The result reflects strong execution on the Tokyo DC 3 acquisition, disciplined capital management, and the income visibility that comes from a hyperscale-anchored portfolio. Six insights for asset owners and professionals tracking this name.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">FINANCIAL HEADLINES</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Gross Revenue S$121.0M (+18.4% YoY). NPI S$105.2M (+19.4%). Distributable Income S$74.6M (+20.7%). DPU 2.833¢ (+13.2%). Cost of debt improved to 2.6% (-20bps QoQ; -50bps YoY). Aggregate leverage 35.1% (-20bps QoQ from 35.3%) — well within the 50% MAS regulatory cap with debt headroom of ~S$2.0bn. ICR 7.2x. Portfolio occupancy 95.6%. WALE 6.5 years by lettable area (4.6 years by rental income). Portfolio reversion ~51% on contracts renewed in 1Q 2026. AUM S$6.3B; 25 data centres across 10 countries. At S$2.36 close 16 Apr 2026 (+1.3% on the print): trailing FY25 DPU yield 4.40%; market cap ~S$5.3B; consensus 12-month price target ~S$2.53 implies ~7% capital upside.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">SIX INSIGHTS BEYOND THE HEADLINE</div><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">1. THE QUALITY OF THE DPU GROWTH</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">DI grew +20.7% YoY while DPU grew +13.2% — the difference reflects the enlarged unit base from October 2025's S$398.9M preferential offering (180.6M new units at S$2.24) that funded Tokyo DC 3. The 13.2% DPU growth is what survived that capital raise — strong evidence that the deployed capital is converting into income at high efficiency. The cleanest read is FY25's adjusted DPU ex-preferential of 10.629c, against which the 1Q 2026 run-rate confirms the acquisition is accretive on a fully-issued basis.</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">2. RENTAL REVERSION CONTEXT</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The ~51% reversion in 1Q 2026 is a strong indicator of pricing power in supply-constrained markets like Singapore and Dublin. Context for modelling: ~6% of rental income comes up for renewal in 2026 and again in 2027, so the 51% applies to a focused renewal pool — meaningful for the lifted rents but not a full-portfolio rerating. The structural strength is the long-tail of the book: 53.5% of lettable area runs to 2031 or beyond, providing exceptional income visibility for a sector this exposed to AI-driven demand growth.</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">3. KDC SGP 1 — THE PORTFOLIO'S NEXT MAJOR VALUE-CREATION OPPORTUNITY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Singapore 1 (25 Serangoon North Avenue 5) is currently at 50.9% occupancy — a deliberate position that reflects active portfolio management. Management secured a 30-year land tenure extension to Sep 2055 in September 2025, funded ~S$10.7M from preferential offering proceeds. That extension is a clear setup for either AEI, asset repositioning, or redevelopment. With 225,945 sqft of GFA on a freehold-equivalent runway, KDC SGP 1 represents one of the most actionable value-creation opportunities in the Singapore data centre stock. The next disclosure on this asset will be one of the more important pieces of news for unitholders this year.</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">4. THE CAPITAL STRUCTURE IS WORKING — AND HAS A TAILWIND TO MONITOR</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Cost of debt fell 20bps QoQ to 2.6% on the full-quarter contribution of competitive JPY-denominated acquisition loans drawn for Tokyo DC 3. JPY now represents 39.6% of the debt stack (vs 13.9% a year ago), giving the REIT a structural funding-cost advantage in the current rate environment. The variable to track is Bank of Japan policy normalisation — the same JPY mix that's driving today's cost-of-debt improvement is the lever to watch as global rate cycles evolve. With 84.8% of debt at fixed rates and a hedge tenor of 3.4 years, near-term sensitivity is well-contained.</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">5. AGGREGATE LEVERAGE AT 35.1% — WITH A TRANSLATION TAILWIND</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The 20bps QoQ decline reflects the SGD value of JPY and EUR borrowings translating lower as those currencies softened. Underlying borrowing levels are stable. The natural hedge of overseas debt against overseas asset values mitigates FX swings on the income line, while the translation effect provides modest leverage flexibility. ~S$550M of debt headroom against the 40% internal threshold (~S$2bn against the 50% regulatory cap) gives the manager continued firepower for accretive acquisitions through 2026.</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">6. HYPERSCALE STRATEGY DELIVERING ANCHOR-TENANT DEPTH</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The top hyperscaler client now contributes 42.8% of rental income (1Q25: 40.8%; FY25: 42.1%), reflecting the natural concentration that comes with executing a hyperscale-focused acquisition strategy. Each of Tokyo DC 3, KDC SGP 7, and KDC SGP 8 is anchored by a single Fortune Global 500 hyperscaler — investment-grade counterparties with multi-year contractual commitments and the structural demand profile (cloud, AI inference, AI training) that underpins data centre sector growth through 2030. Total client count of 72 reflects portfolio quality over breadth; the 53.5% of lettable area expiring 2031+ confirms the duration value of that anchor-tenant strategy.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">VALUATION & SECTOR CONTEXT</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">KDC REIT trades at P/NAV ~1.38x (FY25 NAV/unit S$1.71) with a 4.40% trailing yield — a premium to the broader S-REIT universe that reflects its STI-constituent status, hyperscale-focused portfolio, and the structural data centre demand thesis. The deck cites DC Byte projections of global data centre supply-demand tightness through 2029 (demand 56→114 GW; supply 60→116 GW) and McKinsey research showing AI inference reaching 37% of global DC workload by 2030 from 9% today. KDC REIT's ~S$550M debt headroom positions it well to participate in the hyperscale acquisition pipeline that is expected to scale through 2026.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY TAKEAWAY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The 1Q 2026 print is a high-quality result that demonstrates the income engine is converting acquisition capital efficiently. Three forward catalysts merit attention from professionals tracking the name: (1) the eventual KDC SGP 1 repositioning announcement — a meaningful potential value-creation event; (2) the next acquisition and where it sits on the cost-of-capital curve given continued debt headroom; (3) JPY policy backdrop given the structural advantage the current debt mix provides. With the hyperscale acquisition pipeline still active and the Tokyo DC 3 contribution now flowing at full quarterly run-rate, the trajectory through FY2026 looks constructive.</p></div>
