<p class="ed-art-standfirst">Hiap Hoe Limited (SGX: H17) released its FY2025 Annual Report covering the year ended 31 December 2025.</p>
<div class="ed-art-byline"><span class="ed-art-byline-by">By PropertyAtlas</span><span class="ed-art-byline-sep">&middot;</span><span>14 April 2026</span><span class="ed-art-byline-sep">&middot;</span><span>6 min read</span></div>

<div class="ed-art-body"><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Hiap Hoe Limited (SGX: H17) released its FY2025 Annual Report covering the year ended 31 December 2025. Revenue grew 7.7% to S$135.0M and net profit attributable to owners surged 4.6x to S$30.4M — a standout year driven by strong hotel performance, a dramatic occupancy turnaround at Orchard Towers, and a S$12M reduction in finance costs on lower interest rates.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">FINANCIAL HIGHLIGHTS</div><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Revenue: S$135.0M (FY2024: S$125.4M; +7.7%) — Hotel S$94.8M (+12.9%), Rental/carpark S$29.4M (+0.3%), Leisure/bowling S$10.8M (-2.3%). No development revenue in FY2025 (FY2024: S$1.0M).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Net profit attributable to owners: S$30.4M (FY2024: S$6.6M; +4.6x). Includes: fair value gain on investments S$30.2M (FY2024: S$24.3M), impairment write-back on 130 Stirling Street S$2.5M, impairment on 25 Rowe Avenue S$0.5M, over-provision of prior-year tax S$2.7M (related to Four Points Melbourne disposal in FY2024).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>EPS: 6.45¢ (FY2024: 1.40¢).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>NAV/share: S$1.5811 (FY2024: S$1.5197; +4.0%).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Equity attributable to owners: S$744.0M (FY2024: S$715.1M).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Investment properties (cost model): carrying S$527.1M (FY2024: S$532.5M); FAIR VALUE S$840.7M (FY2024: S$830.8M; +1.2%).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>PP&E hotels+bowling: S$542.6M (FY2024: S$559.8M).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Financial investment portfolio: S$461.0M (FY2024: S$398.3M; +15.7%).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Total loans: S$853.5M (current S$246.2M + non-current S$607.3M) vs S$768.3M FY2024. Weighted average effective rate improved materially: secured borrowings at 2.41–3.15% vs 4.39–5.04% FY2024.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Finance costs: S$26.5M (FY2024: S$38.5M; -S$12.0M — largest single driver of profit improvement).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Cash and short-term deposits: S$140.1M (FY2024: S$69.8M).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Shares: 470,557,541 (FY2024: 470,557,541 net of treasury; treasury shares of 3,999,850 cancelled during FY2025).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Dividend: 1.25¢ total (0.25¢ interim + 1.00¢ final) vs 0.75¢ FY2024. Final dividend +100% to 1.00¢.</li></ul><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY FY2025 DEVELOPMENTS</div><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Orchard Towers — Occupancy Turnaround:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The flagship freehold Orchard Road retail/office property (NLA 11,898sqm; 21 retail + 38 office strata units) saw committed occupancy surge from 53% in FY2024 to 84% in FY2025. The Group's strategy of competitive pricing and an ongoing makeover is proving effective — Orchard Towers is positioned as a high-value option for businesses seeking Orchard Road presence at comparatively lower cost.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>130 Stirling Street Perth — Occupancy and Impairment Recovery:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The A-grade Perth CBD office building (11,792sqm office + 263sqm retail) recorded occupancy of 95% in FY2025, up sharply from 76% in FY2024. Reflecting the improved tenancy profile, the Group recognised a S$2.5M impairment write-back — partially reversing the S$4.1M impairment taken in FY2024. The asset is now near-fully let.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>25 Rowe Avenue — Stable with Minor Impairment:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The Rivervale Perth office building (NLA 10,455sqm; 81% occupancy FY2025, stable) recorded a S$0.5M impairment in FY2025, reflecting Australian commercial property headwinds. The asset continues to contribute recurring income.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Aloft Singapore Novena — Hotel Ramp Continues:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The flagship 781-room hotel (99.54% stake, Marriott/Aloft managed, largest Aloft worldwide) reported revenue growth of 27% YoY in FY2025, continuing its post-rebranding stabilisation following the 2023 Aloft launch. The two-tower Zhongshan Park integrated development (office + mall + hotel) achieved full occupancy across its commercial components.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Great Eastern Motor Lodge (Perth) — First Full Year:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The 198-room budget hotel acquired in March 2024 for A$42.1M delivered its first full operating year, achieving occupancy of more than 93% — strong proof-of-concept for the value-segment acquisition.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Aloft Perth — Robust at >91%:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The 224-room Aloft Perth (Marriott managed) maintained occupancy above 91% for the year.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Holiday Inn Express Manchester — Stable:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The 220-room Trafford City hotel held its market share despite UK economic headwinds, delivering stable revenues and profit.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Zhongshan Mall & Hiap Hoe Building — Full Occupancy:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Both commercial components of the Zhongshan Park integrated development (50,000sqft mall + 13-storey office tower) achieved 100% occupancy in FY2025.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>HH@Kallang Industrial — 96% Stable:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The freehold Kallang light industrial building (45 factory units + canteen; NLA 8,373sqm) maintained 96% occupancy.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>1 & 3 Yuan Ching Road — 99%:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Properties adjacent to SuperBowl Jurong grew occupancy from 94% to 99% in FY2025.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>SuperBowl — 7 Centres:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The leisure segment now operates 7 bowling centres (from 8) following the closure of the HomeTeamNS-JOM clubhouse in January 2025. Revenue S$10.8M (FY2024: S$11.1M). Remaining outlets: Khatib HomeTeamNS, SAFRA Tampines, Keat Hong CC, SuperBowl Mount Faber, SuperBowl Toa Payoh, SuperBowl Jurong, Siglap CC.</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Treasury Share Cancellation:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>The 3,999,850 treasury shares (cost S$1,101,125) were cancelled during FY2025, reducing issued share capital accordingly.</li></ul><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">PROPERTY PORTFOLIO SNAPSHOT (31 DEC 2025)</p><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Singapore — Investment Properties (cost model; carrying S$527.1M total; fair value S$840.7M):</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Orchard Towers (Retail/Office): 400 Orchard Road + 1 Claymore Drive; Freehold; 11,898sqm NLA; 84% occ FY2025</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Zhongshan Park (Mall + Office): Balestier Road; 99yr LH from Nov 2008; 15,138sqm GFA; 100% occ FY2025</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• HH@Kallang (Industrial): 56 Kallang Pudding Road; Freehold; 8,373sqm NLA; 96% occ FY2025</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Parklane Shopping Mall: 35 Selegie Road; 99yr LH from Dec 1974; 2,352sqm NLA</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Orchard Plaza: 150 Orchard Road; 99yr LH from Jun 1977; 1,424sqm NLA</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Bukit Timah Plaza: 1 Jalan Anak Bukit; 99yr LH from Aug 1976; 112sqm NLA</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Residential Units (68 St Thomas Walk + 1 Lewis Road): Freehold; ~1,213sqm NLA</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Singapore — PP&E:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Aloft Singapore Novena: 16 Ah Hood Road / 1 Jalan Rajah; 99yr LH from Nov 2008; 781+4 rooms; 23,983sqm GFA; rev +27% YoY</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• SuperBowl Jurong: 1 Yuan Ching Road; 30yr LH from Jan 2002; 21,754sqm land</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Australia — Investment Properties:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• 130 Stirling Street Perth (Office): Freehold; A-grade; 12,055sqm NLA; 95% occ FY2025; S$2.5M impairment write-back</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• 25 Rowe Avenue Perth (Office): Freehold; 10,455sqm NLA; 81% occ FY2025; S$0.5M impairment</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Australia — PP&E:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Aloft Perth: 27 Rowe Avenue, Rivervale; Freehold; 224 rooms; 17,774sqm GFA; >91% occ</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Great Eastern Motor Lodge: Great Eastern Highway, Rivervale; Freehold; 198 rooms + 180 bays; >93% occ</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>UK — PP&E:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Holiday Inn Express Manchester: 2 Mercury Way, Trafford; 200yr LH from Aug 2015; 220 rooms; stable FY2025</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Historical:</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Four Points by Sheraton Melbourne — DISPOSED Apr 2024 (A$96M; gain S$18.2M)</li></ul><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">HUMAN CAPITAL</div><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Exact remuneration for all directors (new SGX disclosure requirement complied with):</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Teo Ho Beng (Executive Chairman): S$2,434,321 FY2025 (FY2024: S$2,359,438; +3.2%). Salary 76% / Bonus 23% / Other 1%.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Teo Keng Joo, Marc (CEO): S$415,341 FY2025 (FY2024: S$403,727; +2.9%). Salary 73% / Bonus 22% / Other 5%.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Tan Kim Seng (Executive Director): S$464,555 FY2025 — first full year (FY2024: S$229,073 from 1 Jul 2024). Salary 79% / Bonus 19% / Other 2%.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Chan Kum Onn Roger (NED, ARC Chair): S$55,000 fees (unchanged from FY2024).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Kwok Chui Lian (NED, NC Chair): S$45,000 fees (unchanged).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Ong Seet Joon Amos (NED, RC Chair): S$45,000 fees (unchanged).</li></ul><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>KMP bands (4 disclosed, excluding directors):</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Roland Teo Ho Kang (ED Subsidiaries — brother of Executive Chairman): S$750,001–S$1,000,000 (unchanged).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Teo Poh Sim Agnes (Head HR & Admin — sister of Executive Chairman): S$250,001–S$500,000 (unchanged).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Irene Cheah Lan Kwee (CFO): S$250,001–S$500,000 (unchanged).</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>• Teo Ho Kheong Andrew (ED Subsidiaries — brother of Executive Chairman): Below S$250,000 (unchanged).</li></ul><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Note: The Teo family holds multiple related-party roles — Executive Chairman Teo Ho Beng has five siblings employed in the Group in executive and management positions.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY TAKEAWAY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Hiap Hoe's FY2025 is a genuine operational and financial recovery. Strip out the investment fair value gains and the tax over-provision, and the core business improvement is clear: hotel revenue +13%, Orchard Towers occupancy near-doubled, 130 Stirling Street fully let for the first time in years, and finance costs down S$12M on lower rates. The financial investment portfolio (S$461M) remains the hidden asset — almost equal in size to the cost-model investment property portfolio — and generated S$30.2M in fair value gains. Cash nearly doubled to S$140M. The tripled final dividend to 1.00¢ signals management confidence. Near-term watches: Great Eastern Motor Lodge full-year ramp (first full year complete at >93%), Orchard Towers rental rate trajectory as occupancy consolidates above 80%, and any plans for the S$140M cash balance.</p></div>
