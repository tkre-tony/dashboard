<p class="ed-art-standfirst">OUE REIT FY2025 Annual Report (year ended 31 Dec 2025) reflects a leaner, Singapore-focused portfolio following the December 2024 divestment of Lippo Plaza Shanghai.</p>
<div class="ed-art-byline"><span class="ed-art-byline-by">By PropertyAtlas</span><span class="ed-art-byline-sep">&middot;</span><span>4 April 2026</span><span class="ed-art-byline-sep">&middot;</span><span>1 min read</span></div>

<div class="ed-art-body"><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">OUE REIT FY2025 Annual Report (year ended 31 Dec 2025) reflects a leaner, Singapore-focused portfolio following the December 2024 divestment of Lippo Plaza Shanghai. Total AUM S$5.8B across 6 properties.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY PORTFOLIO CHANGE</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Lippo Plaza Shanghai (Divested Dec 2024): Divested on 27 December 2024 for RMB1,917M (S$357.4M) — a premium to the December 2024 independent valuation of RMB1,769M (S$329.8M). Proceeds used to repay loans. Exits Shanghai office market amid continued weakness, sharpening OUE REIT's focus on Singapore CBD and hospitality assets.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">OFFICE — STRONG SINGAPORE PERFORMANCE</div><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>OUE Bayfront (50%): Occ +0.8pp to 99.0% (office 99.4%, retail 92.3%); valuation +S$34.0M (+2.4%) to S$1,422.0M. Achieved BCA Green Mark Platinum. NLA remeasured to 39,357 sqm post-AEI.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>One Raffles Place (67.95%): Occ stable at 95.3% (office 94.5%, retail 99.4%); valuation +S$3.7M to S$1,930.0M.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>OUE Downtown Office: Occ +1.5pp to 93.4%; valuation flat at S$930.0M. BCA Green Mark Platinum achieved.</li></ul><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">RETAIL</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Mandarin Gallery: Occ -2.5pp to 95.7%; valuation -S$13.0M (-2.9%) to S$438.0M. Pop-up activations (Labubu, Twinkle Twinkle) drove footfall on Orchard Road.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">HOSPITALITY — MIXED PERFORMANCE</div><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Hilton Singapore Orchard (1,080 rooms): RevPAR -S$30 to S$260 (FY2024: S$290; -10.3%); valuation -S$45.5M (-3.5%) to S$1,273.0M.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Crowne Plaza Changi Airport (575 rooms): RevPAR +S$4 to S$246 (FY2024: S$242; +1.7%); valuation -S$9.0M to S$511.0M.</li></ul><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY TAKEAWAY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">OUE REIT's FY2025 story is portfolio consolidation — exiting the underperforming Shanghai office asset and doubling down on Singapore CBD. Office occupancies are near-full and BCA Green Mark upgrades support premium positioning. Hospitality showed divergence: Hilton Orchard softened on RevPAR while Crowne Plaza Changi Airport held up. Strategic review of One Raffles Place as a 'more mature asset' signals further recycling ahead.</p></div>
