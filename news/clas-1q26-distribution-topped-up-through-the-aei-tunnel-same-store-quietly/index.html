<div class="ed-art-body"><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">CapitaLand Ascott Trust 1Q 2026 (three-month period ended 31 March 2026) is a print where the headline is stability — distribution income held relatively stable YoY — but the underlying gross profit was meaningfully lower, with the gap bridged by an explicit top-up from past divestment gains. The Cavendish London (TCL) closed for renovation in January, Madison Hamburg was partially closed for carpark works, four AEIs are running concurrently in 1Q, and the portfolio is mid-pivot toward a higher Living Sector allocation. Across the surface metrics the story reads as soft (actual RevPAU: Japan -24%, UK -9%, USA -1%, France revenue -4%); the same-store reads tell a substantially different story (Japan +3%, UK +1%, USA +7% ex-renovation, France stable ex-AEI). 1Q 2026 is best understood as the trough quarter of a deliberately-managed AEI tunnel, with the operating recovery already visible underneath the reporting noise.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">FINANCIAL HEADLINES</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Total Assets S$8.9B (in line with 31 March 2025). Market Capitalisation S$3.4B (vs S$3.3B). NAV per Stapled Security S$1.14 (vs S$1.11). Properties 106 (vs 102). Cities 45 across 16 countries. Total units >19,000. Gross profit YoY down (no specific dollar figure disclosed in the update — the bridge slide shows components without quantification: closure of TCL + Madison Hamburg, net effect of acquisitions and divestments and ongoing AEIs, depreciation of foreign currencies, partially offset by stronger same-store operating performance). Distribution income relatively stable YoY (mitigated by distribution of past divestment gains, plus interest savings). Aggregate leverage 38.9% (vs 39.9% at 31 March 2025; 100bps deleveraging in twelve months). Effective borrowing cost 2.8% p.a. (vs 2.9% at 31 March 2025; 2.9% at 31 December 2025). Interest Coverage Ratio 3.0x (vs 3.2x). Total debt on fixed rates ~78%. Weighted average debt to maturity 3.1 years (vs 3.5 years). Total available funds S$1.51B (cash S$539M + credit facilities S$972M). Property value unencumbered 67% (vs 68%). Debt headroom to 50% leverage cap c.S$1.9B. Sensitivity: 100bps rate increase reduces ICR to 2.2x and DPS by 0.28 cents. Fitch BBB stable. MSCI ESG upgraded to AA in March 2026 (new disclosure). Same-store RevPAU by market: Australia AUD 188 (+7% YoY), Japan JPY 23,783 (+3% same-store, vs JPY 23,094 prior period — note actual unadjusted RevPAU dropped from JPY 14,264 to JPY 10,800 due to mix), Singapore S$187 (+2%), UK GBP 130 (+1% same-store ex-TCL), USA USD 158 (-1% reported, +7% ex-Sheraton Tribeca renovation). Portfolio occupancy 77%. Actual portfolio RevPAU S$137. Acquisition of three Hiratsuka rental housing properties in February 2026 at JPY 4.6B (S$38.3M), 4.1% NOI yield, +0.2% DPS accretion on FY 2025 pro forma basis.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">THREE MOVES BEYOND THE HEADLINE</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">1. THE DISTRIBUTION IS HELD STABLE BY DESIGN, NOT BY OPERATIONS — PAST DIVESTMENT GAINS ARE FUNDING THE AEI TUNNEL THROUGH 2026 AND LIKELY 2027:</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The 1Q 2026 gross profit bridge slide is unusually candid: the manager shows 1Q 2025 gross profit on the left, 1Q 2026 gross profit on the right, and three drag bars in between (TCL + Madison Hamburg closure; net effect of acquisitions, divestments and ongoing AEIs other than TCL; foreign-currency depreciation), partially offset by stronger same-store operating performance and an explicit "top up" component. The text under the bridge confirms what the bars imply: distribution income remained relatively stable due to (a) distribution of past undistributed divestment gains to mitigate the impact of the TCL AEI and Madison Hamburg works, and (b) interest savings from lower interest rates. This is a deliberate, disclosed mechanism for bridging the AEI window. The Looking Ahead section reinforces it: the 2026-2027-2028 trajectory chart explicitly shows "Past divestment gains will be distributed to mitigate the impact of the AEI of TCL" in the 2026 column. For unitholders the implication is twofold. First, the headline distribution stability is real but is being engineered through a one-off-by-design distribution decision rather than through unmanipulated operating cash flow — a useful disclosure that some peer REITs would not make this explicitly. Second, the divestment-gains pool is a finite resource. CLAS has completed S$800M+ of divestments at up to 100% premium to book between 2024 and YTD 2026, and the bridge holds as long as that pool absorbs the AEI drag plus any further softness in operating performance. The pool is large enough — Citadines Central Shinjuku Tokyo divested in October 2025 with proceeds being deployed in 2Q 2026 to repay higher-interest debt; Somerset Olympic Tower Tianjin divested April 2025; Citadines Mount Sophia Singapore in 2024. The mechanism is sustainable through the planned AEI tunnel, but it is a topped-up number rather than an organic one, and it is important not to read 1Q 2026 stability as if it were operating-driven.</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">2. THE GEOGRAPHY MIX MASKS THE OPERATING RECOVERY — SAME-STORE READS ARE +3% JAPAN, +1% UK EX-TCL, +7% USA EX-RENOVATION, FRANCE STABLE EX-AEI, WITH AUSTRALIA AND SINGAPORE OUTRIGHT POSITIVE:</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The actual unadjusted RevPAU by market reads ugly. Japan RevPAU fell from JPY 14,264 to JPY 10,800 (-24% reported). UK RevPAU fell from GBP 139 (1Q 2025 inclusive of TCL) to GBP 127 (1Q 2026 with TCL closed), -9%. USA RevPAU dipped from USD 160 to USD 158 (-1%). France revenue declined from EUR 5.6M to EUR 5.4M (-4%). At first read this looks like an operating-performance problem. Strip out the AEI-and-disposal noise and the picture inverts. Japan same-store +3% (excluding ibis Styles Ginza Tokyo and Chisun Budget Kanazawa Ekimae acquired January 2025, Citadines Central Shinjuku Tokyo divested October 2025, and prior-year adjustments). Singapore +2% reported (no same-store adjustment material — biennial Singapore Airshow in February 2026 was the demand driver). Australia +7% reported, with Ashes cricket matches, Ed Sheeran concerts, and the Royal Edinburgh Military Tattoo in Brisbane the named drivers. UK +1% same-store ex-TCL and prior-year adjustments — driven by stronger performance at Citadines Holborn-Covent Garden London following its 2024 AEI completion. USA +7% on the same-store ex-Sheraton Tribeca New York Hotel reading, with the property mid-renovation in 1Q 2026 and dragging the actual reported figure into negative territory. France stable ex-Citadines Place d'Italie Paris (under AEI from January 2026). The pattern: every market that the manager has put under renovation has dragged the headline; the assets that completed AEI in prior cycles (CHCGL in UK, Robertson House in Singapore) are now contributing the lift. Same-store across the portfolio is positive and the manager states explicitly that RevPAU increased 1% year-on-year excluding TCL and the 2025 acquisitions and divestments. The translation is that 1Q 2026's operating engine is healthier than the headlines suggest — the noise is concentrated in identifiable AEI closures, not diffuse market weakness.</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">3. THE LIVING SECTOR PIVOT IS THE LONG-TERM INVESTMENT CASE — 17% → 18% IN ONE QUARTER, MEDIUM-TERM TARGET 25-30%, AND THE FY27 STAIRCASE IS WHERE THE RE-RATE LIVES:</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">CLAS's strategic positioning slide makes the medium-term portfolio target explicit: 25-30% in rental housing and student accommodation (the "Living Sector"), 70-75% in serviced residences and hotels ("Hospitality assets"). As at 31 March 2026, the actual portfolio split is 18% Living Sector (11% student accommodation + 7% rental housing), up from 17% in the prior period. The February 2026 acquisition of three Hiratsuka rental housing properties at JPY 4.6B / S$38.3M, blended 4.1% NOI yield on FY 2025 pro forma basis, lifted the proportion by one percentage point in the quarter. The Living Sector compounding logic is structural: 29 rental housing properties in Japan with average occupancy >95% and average two-year leases; 9 US student accommodation properties at c.89% occupancy for AY 2025-2026 and >80% pre-leased for AY 2026-2027 (pacing ahead of last year). Living Sector contributes 18% of FY 2025 portfolio value but 20% of 1Q 2026 gross profit (per appendix slide 31), already disproportionate to its asset weight. The forward staircase laid out on the Looking Ahead roadmap is where the investment case crystallises. 2026: trough quarter, AEI drag, distribution top-up. 2027: TCL completed and recontributing, Sheraton Tribeca New York completed, Sotetsu Grand Fresa Osaka-Namba completed, Citadines Place d'Italie Paris completed, plus Somerset Clarke Quay Singapore (the redevelopment of former Somerset Liang Court, 192-unit serviced residence with hotel licence) commencing operations. 2028: stabilised performance from Somerset Clarke Quay Singapore, higher contribution from AEIs completed in 2027. The total capital expenditure for the four ongoing AEIs plus remaining capex for Somerset Clarke Quay redevelopment is c.S$260M, of which CLAS's investment is c.S$180M (the remainder funded by master lessee or operator). For unitholders, the question is not whether 1Q 2026 reads soft on the surface — it does, by design — but whether the 2026 → 2027 → 2028 staircase delivers, and whether the Living Sector tilt continues at the pace that the medium-term target implies (a further 7-12 percentage points of portfolio reallocation from current 18% toward 25-30% target, requiring sustained capital recycling).</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">CAPITAL POSITION AND TWENTY-YEAR FRAMING</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The balance sheet is the underrated piece of this update. Aggregate leverage 38.9% (down from 39.9% twelve months ago, a 100bps deleveraging while simultaneously executing four AEIs and a multi-property acquisition programme). Effective borrowing cost 2.8% p.a. (down from 2.9% twelve months ago, with the manager guiding effective cost to remain relatively stable for FY 2026). Total debt on fixed rates ~78% (within the 70-80% policy band). Weighted average debt to maturity 3.1 years. Debt currency mix: JPY 40%, USD 17%, EUR 17%, SGD 15%, GBP 10%, KRW 1% — a natural-hedge structure where borrowing currency matches the underlying asset base. Foreign exchange after hedges had a 0.4% impact on 1Q 2026 gross profit (loss). Total available funds S$1.51B (S$539M cash + S$972M credit facilities including S$500M committed). Debt headroom to the 50% aggregate leverage cap is c.S$1.9B. Fitch BBB Stable outlook unchanged. The MSCI ESG rating was upgraded to AA in March 2026, joining the 5th-consecutive-year GRESB Global Listed Sector Leader-Hotel and the S&P Global Sustainability Yearbook 2025 and 2026 inclusion. Approximately 70% of CLAS's gross floor area is green-certified as at December 2025, having met the 2025 50% target with the trust on track to meet the 100% 2030 target. CLAS is celebrating its twentieth anniversary in 2026 — the framing throughout the deck ("Celebrating Two Decades of Strength and Stewardship") is positioned as a long-term track record argument that pairs naturally with the Living Sector tilt: the trust that diversified earliest (Asia Pacific anchored, 16 countries, four asset classes, lease-structure mix of master leases / MCMGI / management contracts / direct operations) is the one best positioned to absorb a multi-AEI tunnel without distribution disruption.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY TAKEAWAY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">CapitaLand Ascott Trust 1Q 2026 is the trough quarter of a deliberately-engineered AEI tunnel. Distribution income held stable YoY only because past divestment gains were distributed to bridge the gap created by The Cavendish London closing for renovation, Madison Hamburg part-closing for carpark works, and four concurrent asset enhancement initiatives running through the quarter. Strip the closures and the renovations and the same-store operating performance is positive: Japan +3%, UK +1% ex-TCL, USA +7% ex-Sheraton Tribeca, France stable ex-Citadines Place d'Italie, Australia +7% reported, Singapore +2% reported. The Living Sector tilt — from 17% to 18% of portfolio value in the quarter, with a medium-term target of 25-30% — is the long-duration investment case and is being executed at pace through Japan rental housing acquisitions at attractive entry yields. The balance sheet has 100bps of additional headroom versus a year ago (38.9% vs 39.9%), borrowing cost is 10bps lower (2.8% vs 2.9%), and the debt structure remains a natural-hedge match to the underlying foreign-currency asset base. For unitholders, the question is not whether 1Q 2026 reads soft — it does, by design, and is disclosed candidly — but whether the 2026 → 2027 → 2028 recovery staircase plays out as the manager has laid it out. Distribution stability through the tunnel is engineered, not organic; the operating recovery underneath the noise is real.</p></div>
