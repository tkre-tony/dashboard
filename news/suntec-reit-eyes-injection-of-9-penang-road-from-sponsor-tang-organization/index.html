<p class="ed-art-standfirst">Tang Organization, the new sponsor of Suntec Real Estate Investment Trust, may inject its 9 Penang Road building — which houses UBS's Singapore operations — into the Reit's portfolio.</p>
<div class="ed-art-byline"><span class="ed-art-byline-by">By PropertyAtlas</span><span class="ed-art-byline-sep">&middot;</span><span>16 April 2026</span><span class="ed-art-byline-sep">&middot;</span><span>2 min read</span></div>

<div class="ed-art-body"><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Tang Organization, the new sponsor of Suntec Real Estate Investment Trust, may inject its 9 Penang Road building — which houses UBS's Singapore operations — into the Reit's portfolio. Suntec Trust Management was responding to a unitholder query ahead of the Reit's annual general meeting on Thursday (Apr 10), addressing Tang Organization's pipeline of properties for the Reit.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">ASSET OVERVIEW — 9 PENANG ROAD</div><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Location: Orchard Road / Dhoby Ghaut — prime commercial and retail hub</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Description: Eight-storey Grade-A commercial building comprising two office towers and an ancillary retail space</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Completed: 2019</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Current occupancy: UBS Singapore operations</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>Ownership history: Suntec Reit sold its 30% stake in 2021 to Haiyi Holdings for ~S$89.9M. Haiyi Holdings had previously co-redeveloped the site with Suntec Reit and SingHaiyi Group, already holding a 35% JV stake prior to buying out Suntec Reit's interest. Tang Organization (Gordon Tang / Celine Tang) controls Acrophyte Asset Management, which took over as Suntec's manager (previously ESR Trust Management) in March 2026.</li></ul><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">MANAGER'S POSITION</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The Suntec Trust Management team said it will undertake a review to strengthen portfolio performance and enhance capital efficiency, including exploring disciplined approaches to asset-optimisation and recycling. Value-unlocking strategies cited by analysts include a potential acquisition of 9 Penang Road from Gordan Tang's SingHaiyi Group.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">SPONSOR PORTFOLIO — OTHER ASSETS IN VIEW</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The Tangs also hold interests in One Raffles Quay (ORQ), Marina Bay Financial Centre (MBFC) Towers 1 and 2, and Marina Bay Link Mall. In December 2025, Hongkong Land announced plans to inject its ORQ and MBFC Towers 1 and 2 holdings into a new private fund, having offered JV partners pre-emptive rights to purchase stakes in ORQ and MBFC Towers 1, 2 and 3. Keppel Reit exercised its option to acquire Hongkong Land's one-third stake in MBFC Tower 3 for S$1.45B. Pre-emptive offers for ORQ and MBFC Towers 1 and 2 lapsed.</p><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">UNITHOLDER CONCERNS — MANAGER'S RESPONSES</p><ul style="margin:0 0 8px;padding-left:16px;list-style:none"><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>On ORQ / MBFC: The manager said these are very good quality assets in the core CBD, priced competitively. Any acquisition funded fully by debt would bring aggregate leverage above 45% for a one-sixth stake — not viable at current structure.</li><li style="font-size:12px;line-height:1.65;color:var(--txt);margin-bottom:5px;padding-left:2px"><span style="color:var(--g2);margin-right:6px;font-size:10px">▸</span>On NAV discount: Reit was trading at ~30% discount to NAV. Discount narrowed to 29% as at Dec 31, 2025 (from 43% a year earlier). Issuing equity would be dilutive to NAV and DPU — manager's view: not in unitholders' interest.</li></ul><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">DIVESTMENT CONTEXT — SUNTEC CITY STRATA FLOORS</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Suntec Reit previously divested strata office floors at Suntec City. In 2021, three floors in Towers 1 and 2 were sold to SilkRoad Property Partners for S$197M — an 8.9% premium to independent valuation of S$180.9M, net gain S$13.9M. Those properties changed hands in 2024 when HSBC Asset Management took over SilkRoad; HSBC has listed them for sale at S$135M.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY TAKEAWAY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The 9 Penang Road injection is a live pipeline item but not imminent — the manager is running a strategic review first. The key question for unitholders: how aggressively will the Tang-affiliated management team pursue asset recycling, and can the sponsor's CBD holdings (ORQ, MBFC, 9 Penang Road) be injected on terms that are genuinely accretive given current leverage constraints? Units of Suntec Reit closed up 1.3% at S$1.52 on Wednesday.</p></div>
