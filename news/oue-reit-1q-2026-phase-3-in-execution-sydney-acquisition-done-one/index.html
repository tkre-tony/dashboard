<div class="ed-art-byline"><span class="ed-art-byline-by">By PropertyAtlas</span><span class="ed-art-byline-sep">&middot;</span><span>22 April 2026</span><span class="ed-art-byline-sep">&middot;</span><span>7 min read</span></div>

<div class="ed-art-body"><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">OUE REIT 1Q 2026 (quarter ended 31 March 2026) delivered revenue of S$70.5M (+6.7% YoY), NPI of S$57.6M (+8.4% YoY), and a 17.8% YoY decline in financing costs to S$17.2M — but the operating print is the smaller story. The larger story is that Phase 3 of OUE REIT's strategic journey, announced in January 2026 as "Efficient Capital Allocation to Support the Next Growth Phase," is now visible in one quarter through three simultaneous moves: the completed 19.9% acquisition of 180 George Street (Salesforce Tower) in Sydney, a market-interest exercise on One Raffles Place being run by OUB Centre Limited together with United Overseas Bank Limited, and a planning-approved Level 17 conversion at OUE Bayfront projected to deliver stabilised ROI exceeding 11%. Six insights beyond the headline.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">FINANCIAL HEADLINES</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Revenue S$70.5M (+6.7% YoY). NPI S$57.6M (+8.4% YoY). Share of Results of Joint Venture and Associate S$4.7M (+57.2% YoY), driven by OUE Bayfront's August 2025 refinancing and the partial-quarter contribution of 180 George Street. Financing costs S$17.2M (-17.8% YoY). NAV per unit stable at S$0.55 as of 31 March 2026. Aggregate leverage 41.5% (vs 38.5% at Dec-25; 40.6% at 1Q 2025) following the Sydney acquisition and 1Q distribution drawdowns. Total debt S$2,441M. WACD 3.7% p.a. (-20bps QoQ; -50bps YoY). Average debt term 3.0 years. 73.6% fixed rate. 83.4% green financing. ICR 2.6x (vs 2.1x a year ago). BBB- Stable by S&P. AUM S$6.1B across six Singapore assets and one Sydney asset, Singapore ~95% of portfolio by asset value.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">SIX INSIGHTS BEYOND THE HEADLINE</div><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">1. PHASE 3 IS NOW VISIBLE IN ONE QUARTER — THREE SIMULTANEOUS CAPITAL MOVES</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">No prior quarter in OUE REIT's history has shown this much capital-reallocation activity in a single print. January 2026 framed Phase 3 conceptually, following Phase 1's 2014-2019 scale-up and Phase 2's 2020-2025 balance sheet strengthening and asset value unlock. February 2026 operationalised it with the disclosure that OUB Centre Limited is conducting a market-interest exercise on One Raffles Place together with UOB. March 2026 delivered two completions: the 19.9% acquisition of 180 George Street in Sydney on 16 March, and planning approval for the Level 17 conversion at OUE Bayfront into 22,600 sqft of prime office space at up to S$43M capex, projected to deliver stabilised ROI exceeding 11.0%. Three moves, three months. The Phase 3 narrative has shifted from strategy-announcement to execution-in-progress, which materially re-rates the read on subsequent quarterly prints — the operating beat is now the backdrop, and capital-reallocation disclosures are the leading indicator.</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">2. COST-OF-DEBT LEADERSHIP ACCELERATES — 4.2% → 3.9% → 3.7% ON CONSECUTIVE REFINANCINGS</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">The WACD trajectory — 4.2% at 1Q 2025, 3.9% at Dec-25, 3.7% at 1Q 2026 — reflects consecutive refinancings at materially improved terms. OUE Bayfront's August 2025 refinancing alone drove the JV share uplift visible in the +57.2% YoY growth in Share of Joint Venture Results. Structural underpin: 73.6% fixed-rate debt, 83.4% green financing, BBB- rating maintained by S&P. Sensitivity disclosed: a 25bps rate decline would lift DPU by 0.03 Singapore cents; +100bps would compress ICR from 2.6x to 2.0x — containable. Broader S-REIT context: Keppel REIT's 1Q 2026 WACD printed 3.16% (3.27% underlying), materially below OUE REIT's 3.7%, though that gap reflects debt-stack composition — Keppel REIT carries 39.6% JPY share on near-zero Japan funding costs, while OUE REIT's stack is SGD-dominant. OUE REIT's cost-of-debt improvement is real and structural; the peer comparison is directional rather than like-for-like.</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">3. SINGAPORE OFFICE RENTAL REVERSION DECELERATED TO +6.0%, NOT ACCELERATED — AND THE DIVERGENCE MATTERS</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">OUE REIT's Singapore office portfolio printed rental reversion of +6.0% in 1Q 2026, down from +9.9% in 1Q 2025. In the same quarter, Keppel REIT printed +17.2% (up from +10.6% a year earlier). Two Grade A CBD office portfolios, opposite trajectories. The cleanest read: OUE REIT's 1Q 2025 reversion was elevated by One Raffles Place lease-cycle timing; 1Q 2026 is more representative of normalised pricing power in core CBD Grade A outside the premium-premium segment where MBFC and OFC sit. Committed office occupancy at 95.5% now sits 120bps below the 96.7% Core CBD Grade A benchmark — a reversal from 1Q 2025 when OUE REIT's 96.3% sat above the 94.1% market. Average passing rent S$11.00 psf per month remains meaningfully below the S$12.40 CBD Grade A market rent and the S$12.02 average 2027 expiring rents, so the pricing runway on the next renewal cycle is intact. The 1Q 2026 reversion is not a red flag — but anchoring expectations to +9.9% or drawing a line through Keppel REIT's print would be the wrong framing.</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">4. 180 GEORGE STREET IS THE TEMPLATE, NOT THE END-STATE</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Agreed Property Price A$357.2M (~S$319.8M), 19.9% interest, 5.8% initial passing yield on a freehold, November 2022-completed Premium-grade tower at Circular Quay with 61,914 sqm NLA, 99.2% committed occupancy, WALE of 5.7 years by NLA, Salesforce as 71% anchor tenant (entering OUE REIT's top 10 at 4.9% of combined commercial GRI — third-largest after Deloitte and Luxury Ventures). Two forward-looking mechanics matter most. First, OUE REIT holds pre-emptive rights on the Property, giving it a contractual pipeline to increase its stake — lowering the risk premium on future Sydney-scale deployments. Second, the 5.8% initial yield on freehold Premium-grade Sydney CBD compares to 3.15%-3.55% net yields on recent Singapore CBD office transactions, a 225-265bps cross-border yield pick-up at higher tenure quality. If the ORP market-interest exercise concludes with a sale at or above the S$1,930M Dec-25 valuation, the redeployable capital could fund multiple further Sydney-scale acquisitions on broadly consistent template economics. The variable to watch is the AUD:SGD cross rate — translation at A$1:S$0.8952 (the rate used for the 180 George Street acquisition) is favourable; further AUD strengthening would tighten the SGD-cost of subsequent Sydney deployments and eventually become the binding constraint on replication velocity.</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">5. MANDARIN GALLERY IS REMIXING INTO HIGHER PASSING RENT AT THE COST OF OCCUPANCY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Committed occupancy at Mandarin Gallery moved from 99.5% in 1Q 2025 to 95.6% in 1Q 2026, a 390bps decline. Read alone, that number would be a concern. Read alongside the passing rent trajectory it is a deliberate repositioning: average passing rent S$21.64 → S$22.45 (FY2025) → S$22.98 (1Q 2026), the highest level since 2017's S$23.60 and within 62 Singapore cents of the 2016 era peak. The refreshed line-up publicly flagged in the deck — Rolex, Tudor, Bouillon Gavroche, The City Bakery — signals a deliberate trade-up: letting weaker rents roll off and replacing with flagship-quality concepts at higher psf. Rental reversion of +3.8% for 1Q 2026 (vs +4.9% a year earlier) is the continuing-portfolio read. Orchard Road submarket retail rents rose 0.5% QoQ to S$38.70 psf per month in 1Q 2026 per CBRE, with FY2026 prime rental growth forecast at +1-2%. The watch-item is whether 95.6% is the floor or a waypoint — a sub-95% print in 2Q or 3Q 2026 would shift the frame from "deliberate remix" to "sustained occupancy pressure."</p><div style="font-size:11.5px;font-weight:700;color:#1e3a5f;letter-spacing:.02em;margin:12px 0 4px">6. THE SINGAPORE CBD OFFICE DIVERGENCE IS THE QUARTER'S CLEANEST CROSS-ENTITY SIGNAL</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">In the same quarter, OUE REIT is running a market-interest exercise on One Raffles Place (its single largest Singapore asset, 24.4% of 1Q 2026 portfolio revenue, held at S$1,930M), while Keppel REIT is consolidating MBFC Tower 3 through a stake increase to 66.7%. Two large-cap S-REITs, same market, opposite positions on whether Singapore CBD office is a buy or sell at current cap rates. Neither move reflects portfolio stress — both have comfortable leverage, investment-grade ratings, and high committed occupancy. The divergence reflects capital-allocation philosophy: OUE REIT positioning for cross-border yield capture with potential ORP proceeds; Keppel REIT concentrating on Singapore premium-premium where +17.2% reversion is converting to income. Both readings can be correct simultaneously — the premium-premium band (MBFC, OFC) is a different market from the core CBD Grade A band (ORP, OUE Bayfront, OUE Downtown Office) — but the divergence will be the editorial signal to track over the next four to six quarters.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">VALUATION & CAPITAL MARKETS CONTEXT</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">With NAV per unit of S$0.55 as of 31 March 2026, OUE REIT trades within the diversified S-REIT discount band. The 2026 refinancing calendar — 9.7% of total debt (~S$236M) — is the most proximate catalyst, with management flagging proactive cost and tenor optimisation. Singapore Core CBD Grade A has "no new supply until 2028" per CBRE, with FY2026 rental growth forecast at ~+5%. Sydney CBD Prime occupancy lifted 1.1pp QoQ to 86.7% with Prime gross face rent up 2.4% QoQ per JLL 1Q 2026, supporting the 180 George Street initial passing yield.</p><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g2);margin:14px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">KEY TAKEAWAY</div><p style="font-size:12px;line-height:1.65;color:var(--txt);margin:0 0 8px">Phase 3 is the organising narrative for OUE REIT through 2026 and beyond. The 1Q 2026 operational print is healthy, but the editorial weight sits in the three capital-allocation moves that are now completed (180 George Street, OUE Bayfront Level 17 approval) or live (ORP market-interest exercise). Three forward catalysts merit attention: (1) the outcome of the ORP market-interest exercise — a conclusion with a sale at or near book would reshape funding capacity for Sydney-scale replication; (2) the 2026 refinancing calendar and whether the 3.7% WACD trajectory sustains; (3) Mandarin Gallery's occupancy floor as the tenant-remix plays through. With 180 George Street proving the cross-border template and ORP's fate defining the capital runway, Phase 3 execution is the lens through which every subsequent quarterly disclosure should be read.</p></div>
